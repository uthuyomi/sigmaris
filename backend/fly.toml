# fly.toml app configuration file generated for shift-pilot-ai on 2026-05-03T07:56:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shift-pilot-ai'
primary_region = 'nrt'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  API_PREFIX = '/api'
  APP_ENV = 'production'
  GOOGLE_CALENDAR_ID = 'primary'
  OPENAI_MODEL = 'gpt-5-nano'
  SCHEDULE_AGENT_BASE_URL = 'http://127.0.0.1:8080'
  SCHEDULE_AGENT_ID = 'sigmaris-orchestrator'
  SIGMARIS_PERSONA_PATH = '/app/docs/persona.md'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
